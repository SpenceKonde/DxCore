name: Compile Examples Two

on:
  # workflow_dispatch event allows the workflow to be triggered manually
  # See: https://docs.github.com/en/actions/reference/events-that-trigger-workflows#workflow_dispatch
  workflow_dispatch:
  # repository_dispatch event allows the workflow to be triggered via the GitHub API
  # See: https://docs.github.com/en/actions/reference/events-that-trigger-workflows#repository_dispatch
  repository_dispatch:

jobs:
  compile-examples:
    runs-on: ubuntu-latest

    env:
      platform-name: DxCore:megaavr

      all-parts-sketch-paths: |
        - megaavr/extras/ci/test-sketch/all/dummysketch
        - megaavr/extras/ci/test-sketch/all/macros
    strategy:
      fail-fast: false

      matrix:
        flash-class:
          - 128
          - 64
          - 32
          - 16
        device-family:
          - da
          - db
          - dd
          - du
          - ea
          - eb
          - ec
          - la
        pincount:
          - 64
          - 48
          - 32
          - 28
          - 20
          - 14
        clocksource:
          - internal
          - extclock
          - crystal
        int-osc:
          - 20
          - 24
        mvio:
          - mvio=disabled,
          - ""

        # Filter out these matrix combinations

        exclude:
          - clocksource: extclock
          - clocksource: crystal
          # Things w/out xtals
          - device-family: da
            clocksource: crystal
          - device-family: da
            mvio: mvio=disabled,
          - device-family: db
            mvio: mvio=disabled,
          - device-family: du
            mvio: mvio=disabled,
          - device-family: ea
            mvio: mvio=disabled,
          - device-family: eb
            mvio: mvio=disabled,

          # DA limits. No 8/16k flash, no 32k 64-pin. No 20/14 pin.
          - device-family: da
            flash-class: 32
            pincount: 64
          - device-family: da
            flash-class: 16
          - device-family: da
            pincount: 20
          - device-family: da
            pincount: 14
          # DB limits. No 8/16k flash, no 32k 64-pin. No 20/14 pin.
          - device-family: db
            flash-class: 32
            pincount: 64
          - device-family: db
            flash-class: 16
          - device-family: db
            pincount: 20
          - device-family: db
            pincount: 14
          # DD limits. No 128k/8k flash, no 64/48 pin.
          - device-family: dd
            flash-class: 128
          - device-family: dd
            pincount: 64
          - device-family: dd
            pincount: 48
          # DU limits. No 128k/8k flash, no 64/48 pin. No 64k 20/14pin.
          - device-family: du
            flash-class: 128
          - device-family: du
            pincount: 64
          - device-family: du
            pincount: 48
          - device-family: du
            pincount: 20
            flash-class: 64
          - device-family: du
